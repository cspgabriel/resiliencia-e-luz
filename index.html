<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#1a6b73" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="Serenamente" />
    <meta name="description" content="Apoio emocional diário com IA para reduzir ansiedade, melhorar sono e cuidar de você." />

    <!-- Apple / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Serenamente" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- iOS splash screens (gerar via real-favicon-generator se quiser polish) -->
    <link rel="apple-touch-startup-image" href="/icon.svg" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#1a6b73" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Serenamente — Sua mente em paz, todo dia" />
    <meta property="og:description" content="Apoio emocional diário com IA para reduzir ansiedade, melhorar sono e cuidar de você." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Serenamente — Sua mente em paz, todo dia</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          }
        }
      }
    </script>

    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      html, body {
        overscroll-behavior-y: none;
      }
      body {
        background-color: #f8fafc;
        -webkit-tap-highlight-color: transparent;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }
      .dark body { background-color: #020617; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      .dark ::-webkit-scrollbar-thumb { background: #334155; }

      .safe-pb { padding-bottom: max(var(--sab), 1rem); }
      .safe-pt { padding-top: max(var(--sat), 1rem); }

      /* Standalone-only (quando instalado como PWA) */
      @media (display-mode: standalone) {
        body { user-select: none; -webkit-user-select: none; }
      }

      /* Splash inicial (até React montar) */
      .pwa-splash {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 1rem;
        background: linear-gradient(180deg, #f8fafc 0%, #ecfeff 100%);
        z-index: 10000; transition: opacity .3s;
      }
      .dark .pwa-splash { background: linear-gradient(180deg, #020617 0%, #082f49 100%); }
      .pwa-splash.hidden { opacity: 0; pointer-events: none; }
      .pwa-splash img { width: 72px; height: 72px; animation: pulse 2s ease-in-out infinite; }
      .pwa-splash p { font-weight: 600; color: #1a6b73; }
      .dark .pwa-splash p { color: #67e8f9; }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: .8; } }
    </style>
  </head>
  <body>
    <div id="splash" class="pwa-splash" aria-hidden="true">
      <img src="/icon.svg" alt="" />
      <p>Serenamente</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Remove o splash quando o app montar
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hidden'); setTimeout(() => s.remove(), 400); }
        }, 300);
      });
    </script>
  </body>
</html>
